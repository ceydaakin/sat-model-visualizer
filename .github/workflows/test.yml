name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Verify package builds
        run: |
          python -m pip install --upgrade pip build
          python -m build --wheel

      - name: Run fixture tests
        run: python run_tests.py

      - name: Smoke-test the CLI on the spec example
        run: |
          python sat_visualizer.py \
            --cnf   tests/test_1_spec_example/initial_cnf.txt \
            --model tests/test_1_spec_example/final_model.txt \
            --trace tests/test_1_spec_example/execution_trace_1.txt \
            --trace tests/test_1_spec_example/execution_trace_2.txt \
            --out   /tmp/output.txt
          test -s /tmp/output.txt
          grep -q "Satisfied" /tmp/output.txt
          grep -q "Root" /tmp/output.txt
